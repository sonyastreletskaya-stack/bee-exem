<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Сочинение ПГЭ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-top">
    <h1 class="gov-title">Сочинение ПГЭ</h1>
    <div class="gov-subtitle">Письменная часть экзамена</div>
  </div>
</header>

<nav class="nav">
  <div class="nav-inner">
    <a href="dashboard.html">Личный кабинет</a>
    <a href="#" onclick="logout()">Выйти</a>
  </div>
</nav>

<main class="container">
  <div class="page-box">
    <h1>Сочинение</h1>

    <div class="official-note">
      Тема сочинения: <b>«Мой любимый сервер»</b>.  
      Работа будет направлена на проверку. До проверки в личном кабинете будет указан статус «ожидает проверки».
    </div>

    <form onsubmit="submitEssay(event)">
      <div class="form-row">
        <label for="essay-text">Текст сочинения</label>
        <textarea id="essay-text" required placeholder="Введите текст сочинения..."></textarea>
      </div>

      <button type="submit">Отправить сочинение</button>
    </form>
  </div>
</main>

<footer class="footer">
  Минимальный результат: зачёт.
</footer>

<script src="js/app.js"></script>
<script src="js/essay.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/app.js"></script>
<script src="js/essay.js"></script>

</body>
</html>
